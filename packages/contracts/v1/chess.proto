syntax = "proto3";
package chess.v1;

message Move {
  string match_id = 1;
  string uci = 2; // e.g. "e2e4"
  int64 timestamp = 3;
}

message MatchStatus {
  string fen = 1;
  bool is_active = 2;
  string white_id = 3;
  string black_id = 4;
  string result = 5;
  string reason = 6;
  int32 white_time_ms = 7;
  int32 black_time_ms = 8;
  string white_name = 9;
  string black_name = 10;
  int32 spectators = 11;
}

message MatchAction {
  string match_id = 1;
  string action_type = 2; // "resign", "draw_offer", "draw_accept"
  string player_color = 3; // "w" or "b"
}

message BughouseStatus {
  MatchStatus board0 = 1;
  MatchStatus board1 = 2;
  repeated string bank0w = 3;
  repeated string bank0b = 4;
  repeated string bank1w = 5;
  repeated string bank1b = 6;
}

message BughouseUpdate {
  string match_id = 1;
  oneof event {
    Move move = 2; // contains board index or uci like "P@e4"
    BughouseStatus status = 3;
    MatchAction action = 4;
  }
}

message MatchUpdate {
  oneof event {
    Move move = 1;
    MatchStatus status = 2;
    MatchAction action = 3;
    BughouseUpdate bughouse = 4; // Extension for Bughouse
  }
}
